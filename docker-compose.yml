services:
  postgres:
    image: postgres:16
    container_name: pipelineguard_postgres
    restart: always
    environment:
      POSTGRES_DB: pipelineguard
      POSTGRES_USER: pipelineguard_user
      POSTGRES_PASSWORD: pipelineguard_pass
    ports:
      - "5432:5432"
    volumes:
      - pipelineguard_postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  pipelineguard_postgres_data: